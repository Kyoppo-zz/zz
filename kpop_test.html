<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>K-POP男爱豆匹配测试</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#ff4fa3;
color:white;
font-size:16px;
}

.question{
font-size:22px;
margin-bottom:20px;
}
</style>
</head>

<body>

<h1>K-POP男爱豆匹配测试</h1>

<div id="quiz"></div>

<script>

const questions = [
{
q:"你更喜欢什么类型的男生？",
a:[
{text:"温柔体贴",type:"jeonghan"},
{text:"搞笑活泼",type:"hoshi"},
{text:"成熟可靠",type:"mingyu"},
{text:"安静神秘",type:"wonwoo"}
]
},

{
q:"约会最想做什么？",
a:[
{text:"一起看电影",type:"wonwoo"},
{text:"去海边散步",type:"mingyu"},
{text:"去游乐园",type:"hoshi"},
{text:"一起做饭",type:"jeonghan"}
]
},

{
q:"你的性格更像？",
a:[
{text:"有点腹黑",type:"jeonghan"},
{text:"超级社牛",type:"hoshi"},
{text:"靠谱型",type:"mingyu"},
{text:"安静理性",type:"wonwoo"}
]
}

]

let index=0
let score={}

function show(){

let q=questions[index]

let html=`<div class="question">${q.q}</div>`

q.a.forEach(option=>{
html+=`<button onclick="answer('${option.type}')">${option.text}</button><br>`
})

document.getElementById("quiz").innerHTML=html
}

function answer(type){

score[type]=(score[type]||0)+1

index++

if(index<questions.length){
show()
}else{
result()
}

}

function result(){

let max=0
let idol=""

for(let k in score){
if(score[k]>max){
max=score[k]
idol=k
}
}

let text={
jeonghan:"你匹配的爱豆：尹净汉 😈 温柔但有点坏",
hoshi:"你匹配的爱豆：Hoshi 🐯 活泼又有魅力",
mingyu:"你匹配的爱豆：金珉奎 🐶 成熟可靠",
wonwoo:"你匹配的爱豆：全圆佑 🐱 安静理性"
}

document.getElementById("quiz").innerHTML=`<h2>${text[idol]}</h2>`
}

show()

</script>

</body>
</html>
